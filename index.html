<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yetay Bible Quiz 3.0 Registration</title>
  
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    
    <header class="form-header">
      <div class="header-overlay"></div>
      <div class="header-content">
        <img src="logo.png" alt="Yetay Bible Quiz Logo" class="header-logo">
        <h1>YETAY BIBLE Quiz 3.0</h1>
        <div class="loading-status">
          <p>Venue: <span class="pulse">Loading...</span></p>
          <p>Date: <span class="pulse">Loading...</span></p>
          <p>Time: <span class="pulse">Loading...</span></p>
        </div>
        <h2 class="anticipate-text">ANTICIPATE...</h2>
      </div>
    </header>

    <form id="registrationForm">
      
      <div class="form-section">
        <h3>Church Information</h3>
        
        <div class="inputer">
          <label for="churchName">Church Name <span class="required">*</span></label>
          <input type="text" name="churchName" id="churchName" placeholder="Enter your church name" required>        
        </div>

        <div class="inputer">    
          <label for="churchAddress">Church Address <span class="required">*</span></label>
          <input type="text" name="churchAddress" id="churchAddress" placeholder="Full address of the church" required>
        </div>

        <div class="inputer">    
          <label for="churchContact">Church Contact Number <span class="required">*</span></label>
          <input type="tel" name="churchContact" id="churchContact" placeholder="Enter active phone number" required>
        </div>

        <div class="inputer" style="margin-bottom: 0;">
          <label>Select Competing Categories <span class="required">*</span></label>
          <p class="helper-text">Check all the categories your church will be participating in.</p>
          
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="competingCategories" value="Junior" id="checkJunior">
              Junior Category (Ages 7-11)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="competingCategories" value="Intermediate" id="checkIntermediate">
              Intermediate Category (Ages 12-15)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="competingCategories" value="Senior" id="checkSenior">
              Senior Category (Ages 16-19)
            </label>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" id="submitBtn">Submit Registration</button>
        <button type="reset" class="clear-btn">Clear Form</button>
      </div>
    </form>
  </div>

  <script src="index.js"></script>
</body>
</html>
